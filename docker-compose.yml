services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: weather
      MYSQL_USER: weather
      MYSQL_PASSWORD: weather
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://weather:weather@db:3306/weather
      DATABASE_ENABLED: "true"
      SEED_TEST_USER: "true"
      TEST_USER_EMAIL: test@example.com
      TEST_USER_PASSWORD: testpassword
    volumes:
      # Mount source so code edits apply without rebuilding the image
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command:
      - sh
      - -c
      - uv run alembic upgrade head && exec uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app
    depends_on:
      db:
        condition: service_healthy
